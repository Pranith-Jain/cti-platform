# Convenience compose file for the VPS. Pair with caddy on the host
# (or add a caddy service here) to terminate TLS in front.
#
# Usage:
#   sudo mkdir -p /etc/onion-proxy
#   sudo openssl rand -hex 32 > /etc/onion-proxy/secret
#   sudo chmod 600 /etc/onion-proxy/secret
#   docker compose up -d --build

services:
  onion-proxy:
    build: .
    container_name: onion-proxy
    restart: unless-stopped
    # Bind to localhost only; caddy on the host reverse-proxies to this.
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - /etc/onion-proxy/secret:/etc/onion-proxy/secret:ro
      - tor-data:/var/lib/tor
    # Outbound only — proxy doesn't need to accept inbound from the public net,
    # caddy fronts it. tor handles its own outbound.
    networks:
      - default
    # Tighten Linux capabilities; tor + the proxy need very little.
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    # No host writes outside the volumes.
    read_only: false  # tor writes to /var/lib/tor and /var/log/tor
    # Minimal resources — proxy is single-threaded-ish, tor is bursty.
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

volumes:
  tor-data:
